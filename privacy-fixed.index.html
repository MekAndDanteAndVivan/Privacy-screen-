<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#000000"/>
  <title>PrivacyScreen</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000010;
      font-family: 'Inter', sans-serif;
      color: white;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    #bg {
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 70% at 30% 40%, #120030 0%, transparent 60%),
        radial-gradient(ellipse 60% 60% at 75% 65%, #001030 0%, transparent 60%),
        #000010;
    }

    #black {
      position: fixed; inset: 0;
      background: #000;
      opacity: 0;
      z-index: 5;
      pointer-events: none;
      transition: opacity 0.05s linear;
    }

    #content {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px;
      transition: opacity 0.05s linear;
    }

    #clock {
      font-size: clamp(80px, 25vw, 110px);
      font-weight: 100;
      letter-spacing: -4px;
      line-height: 1;
    }

    #date {
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      margin-bottom: 50px;
    }

    #status {
      font-size: 11px; letter-spacing: 3px;
      text-transform: uppercase;
      padding: 8px 20px;
      border-radius: 100px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #44ffaa;
      transition: color 0.1s, border-color 0.1s;
    }
    #status.tilted {
      color: #ff3344;
      border-color: rgba(255,51,68,0.3);
    }

    #tilt-num {
      margin-top: 12px;
      font-size: 10px; letter-spacing: 3px;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
    }

    /* START SCREEN */
    #start {
      position: fixed; inset: 0; z-index: 100;
      background: #000010;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; padding: 40px; text-align: center;
    }
    #start h1 { font-size: 30px; font-weight: 300; line-height: 1.3; }
    #start h1 b { font-weight: 700; }
    #start p {
      font-size: 13px; line-height: 1.8;
      color: rgba(255,255,255,0.4);
      max-width: 280px;
    }
    #start-btn {
      margin-top: 10px;
      padding: 18px 48px;
      border-radius: 100px;
      background: white;
      color: #000;
      font-size: 14px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      border: none; cursor: pointer;
      transition: transform 0.1s;
    }
    #start-btn:active { transform: scale(0.96); }
    #start small {
      font-size: 10px; letter-spacing: 1px;
      color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>

<div id="bg"></div>
<div id="black"></div>

<div id="content">
  <div id="clock">00:00</div>
  <div id="date">Loading...</div>
  <div id="status">● Screen Visible</div>
  <div id="tilt-num">Tilt: 0°</div>
</div>

<!-- TAP TO START — this is the key fix for Android -->
<div id="start">
  <h1>Tilt to go<br/><b>black 🖤</b></h1>
  <p>Straight on — you see everything.<br/>Tilt left or right — instant black screen.</p>
  <button id="start-btn" onclick="startApp()">Tap to Start</button>
  <small>Requires gyroscope permission</small>
</div>

<script>
  const THRESHOLD = 20;

  const blackEl   = document.getElementById('black');
  const contentEl = document.getElementById('content');
  const statusEl  = document.getElementById('status');
  const tiltNumEl = document.getElementById('tilt-num');
  const clockEl   = document.getElementById('clock');
  const dateEl    = document.getElementById('date');

  // Clock
  function tick() {
    const n = new Date();
    clockEl.textContent = n.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    dateEl.textContent  = n.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
  }
  tick(); setInterval(tick, 1000);

  function applyTilt(roll) {
    const abs = Math.abs(roll);
    const tilted = abs > THRESHOLD;

    blackEl.style.opacity   = tilted ? '1' : '0';
    contentEl.style.opacity = tilted ? '0' : '1';

    tiltNumEl.textContent = `Tilt: ${Math.round(roll)}°`;
    statusEl.textContent  = tilted ? '● Privacy On' : '● Screen Visible';
    statusEl.className    = tilted ? 'tilted' : '';
  }

  function startApp() {
    const startScreen = document.getElementById('start');

    // Hide start screen
    startScreen.style.transition = 'opacity 0.3s';
    startScreen.style.opacity = '0';
    setTimeout(() => startScreen.remove(), 300);

    // Android — deviceorientation fires without permission
    // iOS 13+ — needs requestPermission
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      // iOS
      DeviceOrientationEvent.requestPermission()
        .then(state => {
          if (state === 'granted') {
            window.addEventListener('deviceorientation', e => applyTilt(e.gamma || 0), true);
          } else {
            alert('Permission denied — gyroscope needed!');
          }
        })
        .catch(console.error);
    } else {
      // Android — just listen directly
      let fired = false;
      window.addEventListener('deviceorientation', function handler(e) {
        fired = true;
        applyTilt(e.gamma || 0);
      }, true);

      // If gyro never fires after 2s, show debug info
      setTimeout(() => {
        if (!fired) {
          tiltNumEl.textContent = 'No gyro detected 😕';
          tiltNumEl.style.color = '#ff3344';
        }
      }, 2000);
    }
  }
</script>
</body>
</html>
